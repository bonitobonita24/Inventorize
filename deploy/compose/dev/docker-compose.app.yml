# Next.js app — dev environment
# Builds from source (dev_build: true) and tags locally for push.sh
networks:
  app_network:
    name: ${COMPOSE_PROJECT_NAME}_network
    external: true

services:
  app:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    image: ${DOCKERHUB_USERNAME:-bonitobonita24}/${IMAGE_NAME:-inventorize}:dev-latest
    container_name: ${COMPOSE_PROJECT_NAME}_app
    hostname: ${COMPOSE_PROJECT_NAME}_app
    env_file: ../../../.env.dev
    environment:
      - NODE_ENV=development
      - PORT=${APP_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - STORAGE_ENDPOINT=http://${COMPOSE_PROJECT_NAME}_minio:9000
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_REGION=${STORAGE_REGION}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - SMTP_HOST=${COMPOSE_PROJECT_NAME}_mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - "${APP_PORT}:3000"
    networks: [app_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
